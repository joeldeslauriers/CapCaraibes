<style>
:root {
  --teal:    #00A5C8;
  --teal-dk: #0087A5;
  --teal-dp: #005F7A;
  --teal-lt: #E0F4FA;
  --white:   #FFFFFF;
  --bg-soft: #F4FBFD;
  --border:  #C8E8F2;
  --text:    #1A1A1A;
  --text-sec:#5A6A72;
  --sand:    #FFF8F0;
  --font-h:  'Syne', sans-serif;
  --font-b:  'DM Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--font-b);background:var(--white);color:var(--text);overflow-x:hidden;overscroll-behavior-x:none}
img{max-width:100%;display:block}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.anim-1{animation:fadeUp .6s .0s ease both}
.anim-2{animation:fadeUp .6s .15s ease both}
.anim-3{animation:fadeUp .6s .3s ease both}
.anim-4{animation:fadeUp .6s .45s ease both}

/* ── NAV ── */
/* ── NAV WRAP ── */
.nav-wrap{
  position:fixed;top:0;left:0;right:0;z-index:200;
  transition:all .35s ease;height:92px;
  display:flex;align-items:center;padding:0 5vw;
  justify-content:space-between;
}
.nav-wrap.scrolled{
  background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
  box-shadow:0 2px 20px rgba(0,165,200,.1);border-bottom:1px solid var(--border);
}
.nav-logo img{height:92px;width:92px;object-fit:contain}

/* ── GLOW PILL CONTAINER ── */
.nav-links{
  display:flex;align-items:center;gap:4px;
  background:rgba(0,25,38,.72);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(0,165,200,.45);
  border-radius:28px;padding:5px;
  transition:all .35s ease;
  box-shadow:0 4px 24px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
}
.nav-wrap.scrolled .nav-links{
  background:rgba(244,251,253,.96);
  border-color:var(--border);
  box-shadow:0 2px 12px rgba(0,165,200,.08);
}

/* ── GLOW LINK ── */
.nav-link{
  position:relative;overflow:hidden;
  background:none;border:none;cursor:pointer;
  font-family:var(--font-h);font-size:15px;font-weight:600;
  color:rgba(255,255,255,.92);
  padding:8px 16px;border-radius:22px;
  text-decoration:none;white-space:nowrap;
  transition:color .25s;
  perspective:600px;
}
.nav-wrap.scrolled .nav-link{color:var(--teal-dp)}

/* radial glow bg */
.nav-link::before{
  content:'';position:absolute;inset:0;border-radius:22px;
  background:radial-gradient(circle at 50% 50%, rgba(0,165,200,.6) 0%, rgba(0,135,165,.25) 50%, transparent 80%);
  opacity:0;transition:opacity .3s ease;pointer-events:none;
}
.nav-wrap.scrolled .nav-link::before{
  background:radial-gradient(circle at 50% 50%, rgba(0,165,200,.2) 0%, rgba(0,135,165,.08) 50%, transparent 80%);
}
.nav-link:hover::before,.nav-link.active::before{opacity:1}

/* active solid bg */
.nav-link.active{
  background:rgba(0,165,200,.55);
  color:white;
  box-shadow:0 0 12px rgba(0,165,200,.5);
}
.nav-wrap.scrolled .nav-link.active{
  background:var(--teal-lt);color:var(--teal-dk);
  box-shadow:none;
}

/* 3D flip text */
.nav-link-inner{
  display:block;position:relative;
  transform-style:preserve-3d;
  transition:transform .4s cubic-bezier(.23,1,.32,1);
}
.nav-link:hover .nav-link-inner{transform:rotateX(-8deg) scale(1.04)}
.nav-link-front{display:block;transition:opacity .2s}
.nav-link:hover .nav-link-front{opacity:.0}
.nav-link-back{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(6px);
  transition:opacity .25s .05s,transform .3s cubic-bezier(.23,1,.32,1);
  color:#7DDDF5;
}
.nav-wrap.scrolled .nav-link-back{color:var(--teal)}
.nav-link:hover .nav-link-back{opacity:1;transform:translateY(0)}

/* ── RIGHT SIDE ── */
.nav-right{display:flex;align-items:center;gap:6px}
.lang-btn{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);cursor:pointer;
  font-family:var(--font-h);font-size:11px;font-weight:700;
  color:rgba(255,255,255,.8);padding:4px 10px;border-radius:16px;
  letter-spacing:.08em;text-transform:uppercase;transition:all .2s;
}
.nav-wrap.scrolled .lang-btn{
  background:transparent;border-color:var(--border);color:var(--text-sec);
}
.lang-btn:hover{border-color:#7DDDF5;color:#7DDDF5}
.nav-wrap.scrolled .lang-btn:hover{border-color:var(--teal);color:var(--teal)}
.lang-btn.active{background:var(--teal);border-color:var(--teal);color:white}
.nav-cta{
  margin-left:6px;background:var(--teal);color:white;
  padding:9px 22px;border-radius:24px;text-decoration:none;
  font-family:var(--font-h);font-size:13px;font-weight:700;
  transition:background .2s;white-space:nowrap;border:none;cursor:pointer;
}
.nav-cta:hover{background:var(--teal-dk)}

/* ── MOBILE ── */
.nav-hamburger{
  display:none;background:rgba(0,25,38,.65);border:1px solid rgba(0,165,200,.45);
  cursor:pointer;padding:8px;border-radius:12px;
  backdrop-filter:blur(12px);transition:background .2s;
}
.nav-hamburger:hover{background:rgba(0,165,200,.3)}
.nav-mobile-menu{
  display:none;position:fixed;top:92px;left:0;right:0;
  background:rgba(0,18,28,.94);backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(0,165,200,.3);
  padding:20px 6vw 28px;z-index:199;flex-direction:column;gap:6px;
}
.nav-mobile-menu.open{display:flex}
.nav-mobile-menu .nav-link{
  color:rgba(255,255,255,.9) !important;
  font-size:17px;padding:12px 18px;border-radius:16px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.nav-mobile-menu .nav-link:hover,.nav-mobile-menu .nav-link.active{
  background:rgba(0,165,200,.35) !important;
  color:white !important;
}
.nav-mobile-menu .lang-btn{
  color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.2);
}
.nav-mobile-menu .nav-cta{margin-left:0;display:block;text-align:center;margin-top:8px}

@media(max-width:900px){
  .nav-links{display:none}
  .nav-hamburger{display:block}
  .nav-cta{display:none}
}

/* ── HERO ── */
.hero{
  min-height:100vh;position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 0 60px;
}
.hero-bg{
  position:absolute;inset:0;overflow:hidden;background:#001a24;
}
.hero-bg video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;opacity:1;
  pointer-events:none;touch-action:none;
}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,95,122,.3) 0%,rgba(0,60,80,.1) 40%,rgba(0,40,60,.7) 100%)}
.hero-content{position:relative;z-index:2;padding:120px 7vw 0}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:6px 16px;margin-bottom:22px;
}
.hero-tag span{font-family:var(--font-b);font-size:12px;color:rgba(255,255,255,.9);letter-spacing:.06em;font-weight:500}
.hero-h1{
  font-family:var(--font-h);font-weight:800;line-height:1.0;
  letter-spacing:-.03em;font-size:clamp(48px,8vw,100px);
  color:white;margin-bottom:22px;
}
.hero-h1 span{color:#7DDDF5}
.hero-sub{
  font-family:var(--font-b);font-size:clamp(15px,1.5vw,18px);
  color:rgba(255,255,255,.8);max-width:540px;line-height:1.7;
  font-weight:300;margin-bottom:36px;
}
.hero-ctas{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:40px}
.btn-primary{
  background:var(--teal);color:white;padding:14px 32px;border-radius:30px;
  font-family:var(--font-h);font-size:14px;font-weight:700;
  text-decoration:none;transition:all .2s;display:inline-block;border:none;cursor:pointer;
}
.btn-primary:hover{background:var(--teal-dk);transform:translateY(-2px)}
.btn-outline{
  background:rgba(255,255,255,.12);color:white;padding:14px 32px;border-radius:30px;
  font-family:var(--font-h);font-size:14px;font-weight:700;
  text-decoration:none;border:1px solid rgba(255,255,255,.3);transition:all .2s;display:inline-block;
}
.btn-outline:hover{background:rgba(255,255,255,.22)}
.hero-chips{display:flex;gap:10px;flex-wrap:wrap}
.chip{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:20px;padding:6px 14px;
  font-family:var(--font-b);font-size:12px;color:rgba(255,255,255,.85);font-weight:400;
}
.hero-wave{position:absolute;bottom:-1px;left:0;right:0;line-height:0;z-index:3}

/* ── SECTION BASE ── */
.section{padding:80px 7vw}
.section-alt{background:var(--bg-soft)}
.section-dark{background:var(--teal-dp);color:white}
.section-teal{background:var(--teal);color:white}
.eyebrow{
  font-family:var(--font-b);font-size:11px;font-weight:600;
  color:var(--teal);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;
}
.section-dark .eyebrow,.section-teal .eyebrow{color:rgba(255,255,255,.6)}
.section-h2{
  font-family:var(--font-h);font-size:clamp(28px,4vw,48px);
  font-weight:800;letter-spacing:-.02em;color:var(--teal-dp);
  margin-bottom:16px;line-height:1.1;
}
.section-dark .section-h2,.section-teal .section-h2{color:white}
.section-sub{
  font-family:var(--font-b);font-size:15px;color:var(--text-sec);
  font-weight:300;max-width:580px;line-height:1.7;margin-bottom:48px;
}
.section-dark .section-sub,.section-teal .section-sub{color:rgba(255,255,255,.75)}

/* ── SERVICES CARDS ── */
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.service-card{
  background:white;border:1px solid var(--border);border-radius:20px;
  padding:28px 24px;text-decoration:none;color:inherit;
  transition:all .25s;cursor:pointer;display:block;
}
.service-card:hover{transform:translateY(-4px);border-color:var(--teal);box-shadow:0 8px 32px rgba(0,165,200,.15)}
.service-card.featured{background:var(--teal-dp);border-color:transparent;color:white}
.service-icon{font-size:32px;margin-bottom:16px}
.service-title{font-family:var(--font-h);font-size:18px;font-weight:700;margin-bottom:10px;color:var(--teal-dp)}
.service-card.featured .service-title{color:white}
.service-desc{font-family:var(--font-b);font-size:14px;color:var(--text-sec);line-height:1.65;font-weight:300}
.service-card.featured .service-desc{color:rgba(255,255,255,.7)}
.service-price{
  margin-top:18px;font-family:var(--font-h);font-size:16px;font-weight:700;
  color:var(--teal);
}
.service-card.featured .service-price{color:#7DDDF5}

/* ── TAB SWITCHER ── */
.tabs{display:flex;gap:10px;margin-bottom:36px;flex-wrap:wrap}
.tab-btn{
  padding:10px 24px;border-radius:24px;cursor:pointer;
  font-family:var(--font-h);font-size:13px;font-weight:700;
  border:1px solid var(--border);background:white;color:var(--text-sec);
  transition:all .2s;
}
.tab-btn.active,.tab-btn:hover{background:var(--teal);border-color:var(--teal);color:white}

/* ── DESTINATION DETAIL ── */
.dest-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:32px;align-items:start}
.dest-photo{width:100%;border-radius:20px;object-fit:cover;height:280px}
.dest-tag{
  display:inline-block;background:var(--teal-lt);border-radius:20px;
  padding:5px 14px;margin-bottom:16px;
}
.dest-tag span{font-family:var(--font-b);font-size:12px;color:var(--teal-dk);font-weight:500}
.dest-h3{font-family:var(--font-h);font-size:clamp(24px,3vw,38px);font-weight:800;color:var(--teal-dp);line-height:1.1;margin-bottom:14px}
.dest-desc{font-family:var(--font-b);font-size:15px;color:var(--text-sec);line-height:1.75;font-weight:300;margin-bottom:24px}
.itin-card{background:white;border:1px solid var(--border);border-radius:20px;padding:28px 24px}
.itin-title{font-family:var(--font-h);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:22px}
.itin-step{display:flex;gap:14px;align-items:flex-start;padding-bottom:18px}
.itin-step:last-child{padding-bottom:0}
.itin-dot{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
.dot.active{background:var(--teal)}
.dot.mid{background:var(--border)}
.itin-line{width:1px;flex:1;background:var(--border);min-height:18px;margin-top:3px}
.itin-text{font-family:var(--font-b);font-size:14px;line-height:1.6}

/* ── INCLUDED BANNER ── */
.included-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:36px}
.incl-chip{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:10px;
}
.incl-dot{width:6px;height:6px;border-radius:50%;background:#7DDDF5;flex-shrink:0}
.incl-text{font-family:var(--font-b);font-size:14px;color:rgba(255,255,255,.88);font-weight:400}

/* ── VIDEO SECTION ── */
.video-wrap{border-radius:20px;overflow:hidden;aspect-ratio:16/9;box-shadow:0 8px 40px rgba(0,95,122,.2)}
.video-wrap iframe{width:100%;height:100%;border:0}
.video-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:28px;align-items:start}
.video-info{display:flex;flex-direction:column;justify-content:center}

/* ── SNORKELING OPTIONS ── */
.snorkel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:40px}
.snorkel-card{
  background:white;border:1px solid var(--border);border-radius:20px;padding:32px 28px;
  transition:all .25s;
}
.snorkel-card:hover{border-color:var(--teal);box-shadow:0 6px 24px rgba(0,165,200,.12)}
.snorkel-card.featured{background:var(--teal-dp);border-color:transparent}
.snorkel-price-big{font-family:var(--font-h);font-size:48px;font-weight:800;line-height:1;margin-bottom:4px}
.snorkel-card .snorkel-price-big{color:var(--teal-dp)}
.snorkel-card.featured .snorkel-price-big{color:#7DDDF5}

/* ── FISHING ── */
.fishing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:32px;align-items:start}
.fishing-img{width:100%;border-radius:20px;object-fit:cover}
.species-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.species-tag{
  background:var(--teal-lt);border-radius:16px;padding:5px 14px;
  font-family:var(--font-b);font-size:13px;color:var(--teal-dk);font-weight:500;
}

/* ── SUNSET ── */
.sunset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:40px}
.sunset-card{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:32px 28px;
}
.sunset-card.featured{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}
.sunset-price{font-family:var(--font-h);font-size:44px;font-weight:800;color:#7DDDF5;line-height:1;margin-bottom:6px}

/* ── PRICING ── */
.pricing-img-wrap{
  max-width:420px;margin:0 auto;
  box-shadow:0 8px 48px rgba(0,95,122,.2);border-radius:16px;overflow:hidden;
}
.pricing-img-wrap img{width:100%}

/* ── CONTACT ── */
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:48px;align-items:start}
.contact-info-card{
  background:var(--bg-soft);border:1px solid var(--border);
  border-radius:14px;padding:16px 20px;text-decoration:none;
  transition:all .2s;display:flex;flex-direction:column;gap:3px;
}
.contact-info-card:hover{border-color:var(--teal);box-shadow:0 4px 16px rgba(0,165,200,.1)}
.contact-info-label{font-family:var(--font-b);font-size:11px;color:var(--text-sec);text-transform:uppercase;letter-spacing:.07em;font-weight:500}
.contact-info-val{font-family:var(--font-b);font-size:14px;color:var(--teal-dp);font-weight:500}
.hosts-photo{width:100%;border-radius:20px;object-fit:cover}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 2fr;gap:14px}
.field-label{font-family:var(--font-b);font-size:12px;color:var(--text-sec);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;font-weight:500}
.field-input{
  width:100%;background:white;border:1px solid var(--border);
  border-radius:10px;padding:12px 14px;color:var(--text);
  font-family:var(--font-b);font-size:15px;font-weight:300;outline:none;
  transition:border-color .2s;
}
.field-input:focus{border-color:var(--teal)}
.field-input.err{border-color:#e74c3c}
.submit-btn{
  background:var(--teal);color:white;border:none;
  padding:14px 36px;border-radius:28px;
  font-family:var(--font-h);font-size:15px;font-weight:700;
  cursor:pointer;transition:background .2s;
}
.submit-btn:hover{background:var(--teal-dk)}
.success-box{
  background:rgba(0,165,200,.06);border:1px solid rgba(0,165,200,.2);
  border-radius:20px;padding:48px 32px;text-align:center;
}

/* ── MAP ── */
.map-wrap{border-radius:24px;overflow:hidden;border:1px solid var(--border);height:400px;box-shadow:0 6px 30px rgba(0,165,200,.1)}
.map-wrap iframe{width:100%;height:100%;border:0}

/* ── FOOTER ── */
.footer{background:var(--teal-dp);padding:44px 7vw}

            <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:18}}>
              <div className="form-grid-2">
                <div><label className="field-label">{tc.name}</label><input className={fi('name')} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} onFocus={e=>e.target.style.borderColor='var(--teal)'} onBlur={e=>e.target.style.borderColor=errors.name?'#e74c3c':'var(--border)'}/></div>
                <div><label className="field-label">{tc.email}</label><input type="email" className={fi('email')} value={form.email} onChange={e=>setForm({...form,email:e.target.value})} onFocus={e=>e.target.style.borderColor='var(--teal)'} onBlur={e=>e.target.style.borderColor=errors.email?'#e74c3c':'var(--border)'}/></div>
              </div>
              <div className="form-grid-2">
                <div><label className="field-label">{tc.phone}</label><input className="field-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} onFocus={e=>e.target.style.borderColor='var(--teal)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/></div>
                <div><label className="field-label">{tc.date}</label><input type="date" className="field-input" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} onFocus={e=>e.target.style.borderColor='var(--teal)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/></div>
              </div>
              <div className="form-grid-3">
                <div><label className="field-label">{tc.persons}</label><input type="number" min="1" max="25" className="field-input" value={form.persons} onChange={e=>setForm({...form,persons:e.target.value})} onFocus={e=>e.target.style.borderColor='var(--teal)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/></div>
                <div><label className="field-label">{tc.service}</label>
                  <select className="field-input" style={{cursor:'pointer'}} value={form.service} onChange={e=>setForm({...form,service:e.target.value})}>
                    <option value="">—</option>
                    {tc.services.map((s,i)=><option key={i} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div><label className="field-label">{tc.message}</label><textarea rows={4} className="field-input" style={{resize:'vertical'}} value={form.message} onChange={e=>setForm({...form,message:e.target.value})} onFocus={e=>e.target.style.borderColor='var(--teal)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/></div>
              <button type="submit" className="submit-btn">{tc.send}</button>
            </form>
          )}
        </div>
      </div>
      {/* Map */}
      <div>
        <h3 style={{fontFamily:'var(--font-h)',fontSize:'clamp(22px,3vw,34px)',fontWeight:800,color:'var(--teal-dp)',marginBottom:8}}>{tc.mapTitle}</h3>
        <p style={{fontFamily:'var(--font-b)',fontSize:15,color:'var(--text-sec)',fontWeight:300,marginBottom:24}}>{tc.mapDesc}</p>
        <div className="map-wrap">
          <iframe title="Cap Caraibes — Playa Ballenas" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3764.820786408944!2d-69.54372462365694!3d19.30504374224177!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8eaf8d5a9f9e5e3b%3A0x5c2e5c2e5c2e5c2e!2sPlaya%20Ballenas%2C%20Las%20Terrenas%2C%20Dominican%20Republic!5e0!3m2!1sfr!2s!4v1713000000000!5m2!1sfr!2s" allowFullScreen loading="lazy" referrerPolicy="no-referrer-when-downgrade"/>
        </div>
      </div>
    </section>
  );
};

// ── APP ───────────────────────────────────────────────────────
const App = () => {
  const [lang, setLang] = React.useState(()=>localStorage.getItem('cc_lang')||'fr');
  const [activeSection, setActiveSection] = React.useState('hero');

  const handleLang = (l) => {
    setLang(l);
    localStorage.setItem('cc_lang', l);
    document.documentElement.lang = l;
  };

  React.useEffect(()=>{ document.documentElement.lang = lang; }, [lang]);

  React.useEffect(()=>{
    const sections = ['hero','catamaran','snorkel','peche','sunset','prix','contact'];
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) setActiveSection(e.target.id); });
    },{threshold:.3});
    sections.forEach(id=>{ const el=document.getElementById(id); if(el) obs.observe(el); });
    return ()=>obs.disconnect();
  },[]);

  const t = T[lang];
  return (
    <>
      <Nav lang={lang} setLang={handleLang} t={t} active={activeSection}/>
      <main>
        <Hero t={t}/>
        <Services t={t}/>
        <Catamaran t={t}/>
        <Snorkel t={t}/>
        <Peche t={t}/>
        <Sunset t={t}/>
        <Pricing t={t} lang={lang}/>
        <Contact t={t}/>
      </main>
      <Footer t={t}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
